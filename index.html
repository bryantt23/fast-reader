<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Reader</title>
</head>

<body>
    <div id="current-word" class="current-word">Hello!</div>
    <textarea id="text-input" autofocus></textarea>
    <div id="">
        <button id="reader-btn">Start</button>
        <input id="speed" type="number" step="50" min="100" max="1000" />
    </div>
    <div id="remaining-info"></div>

    <script src="script.js"></script>
</body>

</html>
